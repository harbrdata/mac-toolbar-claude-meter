version: 2.1

orbs:
  node: circleci/node@6.1.0

jobs:
  semantic-release:
    executor:
      name: node/default
      tag: "22.14.0"
    steps:
      - checkout
      - run:
          name: Install semantic-release plugins
          command: |
            npm install \
              @semantic-release/exec \
              @semantic-release/git \
              @semantic-release/changelog \
              -D
      - run:
          name: Run semantic-release
          command: npx semantic-release
      - run:
          name: Reminder
          command: |
            echo ""
            echo "============================================"
            echo "  To build the DMG, run locally:"
            echo "    ./build_dmg.sh"
            echo "============================================"
            echo ""

workflows:
  release:
    jobs:
      - semantic-release:
          context:
            - github-developers-robot
          filters:
            branches:
              only: main
