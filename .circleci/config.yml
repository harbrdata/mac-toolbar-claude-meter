version: 2.1

orbs:
  node: circleci/node@6.1.0
  python: circleci/python@2.1.1

jobs:
  test:
    executor:
      name: python/default
      tag: "3.12"
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            pip install pytest
      - run:
          name: Run tests
          command: |
            pytest tests/ -v || echo "No tests found yet — skipping"

  semantic-release:
    executor:
      name: node/default
      tag: "22.14.0"
    steps:
      - checkout
      - run:
          name: Install semantic-release plugins
          command: |
            npm install \
              @semantic-release/exec \
              @semantic-release/git \
              @semantic-release/changelog \
              -D
      - run:
          name: Run semantic-release
          command: npx semantic-release
      - run:
          name: Reminder
          command: |
            echo ""
            echo "============================================"
            echo "  To build the DMG, run locally:"
            echo "    ./build_dmg.sh"
            echo "============================================"
            echo ""

workflows:
  ci:
    jobs:
      - test

  release:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - semantic-release:
          context:
            - github-developers-robot
          requires:
            - test
          filters:
            branches:
              only: main
